name: Commit Check

on:
  push:
    branches:
      - main
      - dev

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: Run ESLint for linting
      - name: Run ESLint
        run: npm run lint

      # Step 5: Prettier format check
      - name: Prettier Check
        run: npm run format:check

      # Step 6: TypeScript type check
      - name: TypeScript Check
        run: npx tsc --noEmit

      # Step 7: Run tests
      - name: Run tests
        run: npm run test

      # Step 8: Build the project
      - name: Build the project
        run: npm run build

